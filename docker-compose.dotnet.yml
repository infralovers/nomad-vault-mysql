services:
  web:
    build: app/dotnet
    ports:
      - "8080:8080"
    environment:
      VAULT_TOKEN: root
    volumes:
      - ./app/dotnet/config/config.vault.ini:/app/config/config.ini:ro
    depends_on:
      - mysql
      - vault

  mysql:
    image: mysql:9
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root

  vault:
    image: hashicorp/vault:1.18
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev -dev-root-token-id=root -dev-listen-address=0.0.0.0:8200
