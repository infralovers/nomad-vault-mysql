services:
  web:
    build: app/python
    links:
      - mysql:mysql
    ports:
      - "8080:8080"
  mysql:
    image: mysql:9
    environment:
      MYSQL_ROOT_PASSWORD: root

  vault:
    image: hashicorp/vault:1.18
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev -dev-root-token-id=root -dev-listen-address=0.0.0.0:8200
