name: Infralovers Container Build

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

jobs:
  build:
    uses: infralovers/.github/.github/workflows/container.yml@main
    with:
      dockerfile: Dockerfile
      score: 0
      platforms: "linux/amd64, linux/arm64"
      release: true
