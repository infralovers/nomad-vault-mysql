name: Infralovers Container Build (Python)

on:
  push:
    branches: [main]
    paths:
      - "app/python/**"
      - ".github/workflows/ci-python.yml"

  pull_request:
    branches: [main]
    paths:
      - "app/python/**"
      - ".github/workflows/ci-python.yml"

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

jobs:
  build-python-container:
    name: Build and Publish Python Container
    uses: infralovers/.github/.github/workflows/container.yml@main
    with:
      dockerfile: app/python/Dockerfile
      image_name: infralovers/nomad-vault-mysql
      score: 0
      platforms: "linux/amd64, linux/arm64"
      release: false
      push_dockerhub: false
      push_github: false
      push_quay: true
